name: Build Unity Android
on: workflow_dispatch

jobs:
  build:
    name: Build for Android 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          # These 3 lines are the "Manual Force" to fix the sdkmanager error
          ANDROID_HOME: /opt/android-sdk-linux
          ANDROID_SDK_ROOT: /opt/android-sdk-linux
          CHROME_BIN: /usr/bin/google-chrome
        with:
          targetPlatform: Android
          unityVersion: 2018.2.21f1
          # This image is guaranteed to have the SDK at /opt/android-sdk-linux
          customImage: 'unityci/editor:2018.2.21f1-android-0'
          projectPath: .

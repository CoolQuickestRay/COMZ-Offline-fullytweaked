name: Build Unity Android
on: workflow_dispatch

jobs:
  build:
    name: Build for Android 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          # This is the last version that supports both old & new particles
          unityVersion: 5.6.7f1
          # This helps the old project find its files properly
          projectPath: .
          # Ignores minor errors in ancient code to keep the build moving
          allowDirtyBuild: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: COMZ-Android-Build
          path: build/Android

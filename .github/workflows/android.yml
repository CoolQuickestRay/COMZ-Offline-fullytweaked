name: Build Unity Android
on: workflow_dispatch

jobs:
  build:
    name: Build for Android 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Manual SDK Fix
        run: |
          sudo mkdir -p /opt/android-sdk/tools/bin
          if [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            sudo ln -s /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /opt/android-sdk/tools/bin/sdkmanager
          fi
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: 2018.2.21f1
          customImage: 'unityci/editor:ubuntu-2018.2.21f1-android-0'
          projectPath: .
          unityBuilderOptions: '-androidSdkRoot /opt/android-sdk'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: COMZ-Android-Build
          path: build/Android

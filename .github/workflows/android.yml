name: Build Unity Android
on: workflow_dispatch

jobs:
  build:
    name: Build for Android 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          unityVersion: 2018.2.21f1
          # This is the "Magic" line: it tells the builder to use the 2018 environment
          # even though the main server is modern.
          customImage: 'unityci/editor:ubuntu-2018.2.21f1-android-0'
          projectPath: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: COMZ-Android-Build
          path: build/Android
